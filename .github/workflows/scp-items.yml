name: Crawl SCP Wiki

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
      - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  update-main-scp:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Crawler"
        uses: actions/checkout@v6

      - name: "Clone API Repository"
        uses: actions/checkout@v6
        with:
          repository: heroheman/scp-api
          path: scp-api

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: "Install Crawler"
        run: make install

      - name: "Crawl Titles"
        run: make data/scp_titles.json

      - name: "Crawl Hubs"
        run: make data/scp_hubs.json

      - name: "Crawl Items"
        run: make data/scp_items.json

      - name: "Process Items"
        run: make data/processed/items

      - name: "Crawl Tales"
        run: make data/scp_tales.json

      - name: "Process Tales"
        run: make data/processed/tales

      - name: "Crawl GOI"
        run: make data/goi.json

      - name: "Process GOI"
        run: make data/processed/goi

      - name: "Upload crawl outputs"
        uses: actions/upload-artifact@v4
        with:
          name: crawl-data
          path: |
            data/scp_items.json
            data/split/
            data/processed/

      - name: "Merge Main JSON"
        run: make data/all_pages.json
  
      - name: "Clone output repository"
        uses: actions/checkout@v6
        with:
          repository: sixeightyfour/scp-json-sync
          path: output-repo
          token: ${{ secrets.OUTPUT_REPO_TOKEN }}

      - name: "Copy outputs into output repository"
        run: |
          mkdir -p output-repo/output/raw
          mkdir -p output-repo/output/merged
          mkdir -p output-repo/output/split
          mkdir -p output-repo/output/processed

          cp data/scp_items.json output-repo/output/raw/
          cp data/scp_tales.json output-repo/output/raw/
          cp data/scp_hubs.json output-repo/output/raw/
          cp data/goi.json output-repo/output/raw/
          cp data/all_pages.json output-repo/output/merged/

          if [ -d data/split ]; then
            cp -Rf data/split/. output-repo/output/split/
          fi

          if [ -d data/processed ]; then
            cp -Rf data/processed/. output-repo/output/processed/
          fi

      - name: "Commit and push outputs"
        run: |
          cd output-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update SCP crawl outputs" || echo "No changes to commit"
          git push

